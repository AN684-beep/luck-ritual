<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ритуал удачи</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="badge">luck.exe запущен</div>

      <h1>Ритуал удачи</h1>
      <p class="subtitle">
        Введи желание, выбери способ призыва удачи и доверься цифровому хаосу.
      </p>

      <label for="wish">На что загадываем удачу?</label>
      <textarea id="wish" placeholder="Например: чтобы оффер приняли, дедлайн не сгорел, отпуск одобрили..."></textarea>

      <label for="ritual">Что делаем?</label>
      <select id="ritual">
        <option value="energy">✨ Активировать удачу</option>
        <option value="focus">🧘 Настроить фокус</option>
        <option value="chance">📈 Подкрутить вероятность</option>
        <option value="cat">🐈 Погладить виртуального кота</option>
        <option value="socks">🧦 Надеть счастливые носки</option>
        <option value="dice">🎲 Бросить кости судьбы</option>
        <option value="star">🌟 Зафиксировать намерение</option>
        <option value="reset">🔁 Перезапустить сценарий</option>
        <option value="boost">🚀 Включить буст</option>
        <option value="tea">🍵 Заварить спокойствие</option>
      </select>

      <button id="startBtn">Призвать удачу</button>

      <div class="ritual-visual" id="visual">
        <div class="orb"></div>
        <div class="sparkles">✦ ✧ ✦</div>
      </div>

      <div class="result hidden" id="result">
        <div class="luck-line">
          <span>Уровень удачи:</span>
          <strong id="luckPercent">0%</strong>
        </div>
        <div class="progress">
          <div id="progressBar"></div>
        </div>
        <p id="resultText"></p>
      </div>

      <div class="history">
        <h2>Последние ритуалы</h2>
        <ul id="historyList"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
