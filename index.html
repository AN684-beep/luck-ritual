<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ритуал удачи</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="badge">✨ luck.exe запущен</div>

      <h1>Ритуал удачи</h1>
      <p class="subtitle">
        Загадай, выбери способ усиления шансов — и пусть цифровая магия сделает своё дело.
      </p>

      <label for="wish">На что загадываем удачу?</label>
      <textarea id="wish" placeholder="Например: чтобы оффер приняли, дедлайн не сгорел, отпуск одобрили..."></textarea>

      <label>Выбери действие</label>

      <div class="ritual-grid" id="ritualGrid">
        <button class="ritual-card active" data-ritual="energy">✨<span>Активировать удачу</span></button>
        <button class="ritual-card" data-ritual="chance">📈<span>Подкрутить шансы</span></button>
        <button class="ritual-card" data-ritual="cat">🐈<span>Погладить кота</span></button>
        <button class="ritual-card" data-ritual="socks">🧦<span>Надеть носки</span></button>
        <button class="ritual-card" data-ritual="dice">🎲<span>Бросить кости</span></button>
        <button class="ritual-card" data-ritual="boost">🚀<span>Включить буст</span></button>
      </div>

      <button id="startBtn" class="main-button">Призвать удачу</button>

      <div class="ritual-visual" id="visual">
        <div class="glow-ring"></div>
        <div class="orb">🍀</div>
        <div class="sparkles">✦ ✧ ✦ ✧ ✦</div>
      </div>

      <div class="result hidden" id="result">
        <p class="growth" id="growthText"></p>
        <p id="resultText"></p>
      </div>

      <div class="history">
        <h2>Последние ритуалы</h2>
        <ul id="historyList"></ul>
      </div>
    </section>

    <div id="confetti"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
