<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ритуал удачи</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="badge">✨ цифровой ритуал удачи</div>

      <h1>Ритуал удачи</h1>
      <p class="subtitle">
        Загадай желание, выбери действие — и немного подкрутим шансы.
      </p>

      <label for="wish">На что загадываем удачу?</label>
      <textarea id="wish" placeholder="Например: чтобы оффер приняли, дедлайн не сгорел, отпуск одобрили..."></textarea>

      <label>Что активируем?</label>

      <div class="ritual-grid">
        <button type="button" class="ritual-option active" data-ritual="energy">
          <span class="icon">✨</span>
          <span>Удача</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="chance">
          <span class="icon">📈</span>
          <span>Шансы</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="cat">
          <span class="icon">🐈</span>
          <span>Кот</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="dice">
          <span class="icon">🎲</span>
          <span>Судьба</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="boost">
          <span class="icon">🚀</span>
          <span>Буст</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="calm">
          <span class="icon">🍵</span>
          <span>Спокойствие</span>
        </button>
      </div>

      <button type="button" id="startBtn" class="main-button">Призвать удачу</button>

      <div class="magic-zone" id="magicZone">
        <div class="magic-circle">🍀</div>
        <div class="magic-sparkles">✦ ✧ ✦</div>
      </div>

      <div class="result hidden" id="result">
        <h2 id="growthText"></h2>
        <p id="resultText"></p>
      </div>

      <div class="history">
        <h3>Последние ритуалы</h3>
        <ul id="historyList"></ul>
      </div>
    </section>
  </main>

 <script>
document.addEventListener("DOMContentLoaded", function () {
  const wishInput = document.getElementById("wish");
  const startBtn = document.getElementById("startBtn");
  const resultBox = document.getElementById("result");
  const resultText = document.getElementById("resultText");
  const growthText = document.getElementById("growthText");
  const magicZone = document.getElementById("magicZone");
  const historyList = document.getElementById("historyList");
  const ritualOptions = document.querySelectorAll(".ritual-option");

  let selectedRitual = "energy";
  let selectedRitualName = "Удача";

  const ritualTexts = {
    energy: ["Удача активирована. Всё стало чуть светлее и подозрительно перспективнее."],
    chance: ["Шансы подкручены. Вероятность успеха выглядит бодрее обычного."],
    cat: ["Виртуальный кот поглажен. Он замурчал, а это хороший знак."],
    dice: ["Кости судьбы брошены. Выпало что-то очень похожее на хороший вариант."],
    boost: ["Буст включён. На ближайшее время шансы выглядят увереннее."],
    calm: ["Спокойствие заварено. Паника поставлена на паузу."]
  };

  ritualOptions.forEach(function(option) {
    option.addEventListener("click", function() {
      ritualOptions.forEach(function(item) {
        item.classList.remove("active");
      });

      option.classList.add("active");
      selectedRitual = option.getAttribute("data-ritual");
      selectedRitualName = option.innerText.trim();
    });
  });

  startBtn.addEventListener("click", function() {
    const wish = wishInput.value.trim();

    if (!wish) {
      resultBox.classList.remove("hidden");
      growthText.textContent = "Сначала нужно желание";
      resultText.textContent = "Удача любит конкретику. Хотя бы примерно.";
      return;
    }

    magicZone.classList.remove("active");
    void magicZone.offsetWidth;
    magicZone.classList.add("active");

    const growth = Math.floor(Math.random() * 81) + 70;
    const phrases = ritualTexts[selectedRitual] || ritualTexts.energy;
    const text = phrases[Math.floor(Math.random() * phrases.length)];

    growthText.textContent = "Вероятность успеха выросла на " + growth + "%";
    resultText.textContent = text + " Запрос: «" + wish + "».";
    resultBox.classList.remove("hidden");

    const li = document.createElement("li");
    li.textContent = selectedRitualName + ": «" + wish + "» — вероятность успеха +" + growth + "%";
    historyList.prepend(li);
  });
});
</script>
</body>
</html>
