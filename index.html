<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ритуал удачи</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #2f2a45;
      background:
        radial-gradient(circle at top left, #fff2b8 0, transparent 32%),
        radial-gradient(circle at top right, #d9c7ff 0, transparent 34%),
        radial-gradient(circle at bottom, #bff4e8 0, transparent 36%),
        linear-gradient(135deg, #fffaf0, #f3eeff 48%, #eefcff);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 34px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 24px 70px rgba(87, 73, 128, 0.18);
      backdrop-filter: blur(16px);
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff4cf;
      color: #7a5a00;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      color: #33234f;
    }

    .subtitle {
      margin: 0 0 24px;
      color: rgba(47, 42, 69, 0.68);
      line-height: 1.45;
      font-size: 17px;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border: 1px solid rgba(96, 76, 140, 0.16);
      border-radius: 18px;
      padding: 15px;
      font-size: 16px;
      color: #2f2a45;
      outline: none;
      background: rgba(255, 255, 255, 0.9);
    }

    textarea:focus {
      border-color: #8d74d6;
      box-shadow: 0 0 0 4px rgba(141, 116, 214, 0.14);
    }

    .ritual-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .ritual-option {
      border: 1px solid rgba(96, 76, 140, 0.14);
      border-radius: 18px;
      padding: 16px;
      min-height: 82px;
      background: rgba(255, 255, 255, 0.86);
      color: #3b315c;
      cursor: pointer;
      font-weight: 800;
      font-size: 18px;
      line-height: 1.2;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.18s ease;
    }

    .ritual-option .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 42px;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      font-size: 24px;
      background: rgba(141, 116, 214, 0.1);
    }

    .ritual-option:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(87, 73, 128, 0.12);
    }

    .ritual-option.active {
      background: linear-gradient(135deg, #fff7d8, #efe7ff);
      border-color: #8d74d6;
      box-shadow: 0 0 0 4px rgba(141, 116, 214, 0.14);
    }

    .main-button {
      width: 100%;
      margin-top: 22px;
      border: 0;
      border-radius: 18px;
      padding: 17px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #7b61ff, #a66cff);
      box-shadow: 0 14px 34px rgba(123, 97, 255, 0.25);
      transition: 0.18s ease;
    }

    .main-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(123, 97, 255, 0.32);
    }

    .magic-zone {
      height: 44px;
      margin: 24px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .magic-divider {
      width: 72%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(123, 97, 255, 0.35),
        rgba(244, 174, 89, 0.6),
        rgba(123, 97, 255, 0.35),
        transparent
      );
    }

    .magic-zone.active .magic-divider {
      animation: dividerGlow 1.1s ease-in-out 2;
    }

    @keyframes dividerGlow {
      0% {
        transform: scaleX(0.6);
        opacity: 0.4;
        box-shadow: none;
      }

      50% {
        transform: scaleX(1.08);
        opacity: 1;
        box-shadow: 0 0 24px rgba(123, 97, 255, 0.35);
      }

      100% {
        transform: scaleX(1);
        opacity: 0.75;
        box-shadow: none;
      }
    }

    .result {
      padding: 18px;
      border-radius: 20px;
      background: #ffffffb8;
      border: 1px solid rgba(96, 76, 140, 0.12);
    }

    .hidden {
      display: none;
    }

    .result h2 {
      margin: 0 0 8px;
      font-size: 22px;
      color: #6f52cf;
    }

    .result p {
      margin: 0;
      color: rgba(47, 42, 69, 0.72);
      line-height: 1.45;
    }

    .history {
      margin-top: 22px;
    }

    .history h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .history ul {
      margin: 0;
      padding-left: 18px;
      color: rgba(47, 42, 69, 0.62);
    }

    .history li {
      margin-bottom: 7px;
    }

    .confetti {
      position: fixed;
      left: 50%;
      top: 50%;
      pointer-events: none;
      z-index: 100;
      animation: burst 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes burst {
      0% {
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      75% {
        transform:
          translate(
            calc(-50% + var(--x)),
            calc(-50% + var(--y))
          )
          scale(1.35)
          rotate(420deg);
        opacity: 1;
      }

      100% {
        transform:
          translate(
            calc(-50% + var(--x)),
            calc(-50% + var(--y) + 60px)
          )
          scale(0.75)
          rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 620px) {
      .card {
        padding: 24px;
      }

      h1 {
        font-size: 34px;
      }

      .ritual-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="badge">✨ luck.exe запущен</div>

      <h1>Ритуал удачи</h1>
      <p class="subtitle">
        Загадай желание, выбери действие и доверься цифровому хаосу.
      </p>

      <label for="wish">На что загадываем удачу?</label>
      <textarea id="wish" placeholder="Например: чтобы оффер приняли, дедлайн не сгорел, отпуск одобрили..."></textarea>

      <label>Что активируем?</label>

      <div class="ritual-grid">
        <button type="button" class="ritual-option" data-ritual="energy">
          <span class="icon">✨</span>
          <span>Активировать удачу</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="chance">
          <span class="icon">📈</span>
          <span>Подкрутить шансы</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="cat">
          <span class="icon">🐈</span>
          <span>Погладить виртуального кота</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="dice">
          <span class="icon">🎲</span>
          <span>Бросить кости судьбы</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="boost">
          <span class="icon">🚀</span>
          <span>Включить режим буста</span>
        </button>

        <button type="button" class="ritual-option" data-ritual="calm">
          <span class="icon">🍵</span>
          <span>Заварить спокойствие</span>
        </button>
      </div>

      <button type="button" id="startBtn" class="main-button">Призвать удачу</button>

      <div class="magic-zone" id="magicZone">
        <div class="magic-divider"></div>
      </div>

      <div class="result hidden" id="result">
        <h2 id="growthText"></h2>
        <p id="resultText"></p>
      </div>

      <div class="history">
        <h3>Последние ритуалы</h3>
        <ul id="historyList"></ul>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const wishInput = document.getElementById("wish");
      const startBtn = document.getElementById("startBtn");
      const resultBox = document.getElementById("result");
      const resultText = document.getElementById("resultText");
      const growthText = document.getElementById("growthText");
      const magicZone = document.getElementById("magicZone");
      const historyList = document.getElementById("historyList");
      const ritualOptions = document.querySelectorAll(".ritual-option");

      let selectedRitual = "";
      let selectedRitualName = "";

      const ritualTexts = {
        energy: [
          "Удача активирована. Воздух стал легче, внутренний хаос — тише, а обстоятельства получили мягкий пинок в правильную сторону.",
          "Сигнал отправлен. Удача уже делает вид, что просто случайно проходила мимо, но мы-то всё понимаем."
        ],
        chance: [
          "Шансы аккуратно подкручены. Вероятность благоприятного исхода ведёт себя бодрее, чем минуту назад.",
          "Коэффициент успеха повышен. Без громких обещаний, но с уверенным ощущением, что всё может сложиться лучше."
        ],
        cat: [
          "Виртуальный кот поглажен. Он замурчал, прищурился и одобрил происходящее всем своим загадочным видом.",
          "Кот принял запрос, улёгся рядом с удачей и сделал вид, что теперь всё под контролем."
        ],
        dice: [
          "Кости судьбы брошены. Выпало что-то очень похожее на хороший знак, но судьба просила не душнить и не перепроверять.",
          "Судьба сделала бросок, посмотрела на результат и решила пока не мешать."
        ],
        boost: [
          "Режим буста включён. Внутренний двигатель запустился, шансы стали выглядеть увереннее, а сомнения — менее убедительно.",
          "Ускорение активировано. Теперь главное — не потратить этот заряд на тревожное обновление почты каждые две минуты."
        ],
        calm: [
          "Спокойствие заварено. Паника поставлена на паузу, лишний шум приглушён, фокус вернулся на своё место.",
          "Внутренний чайник вскипел в хорошем смысле. Теперь можно действовать спокойнее и точнее."
        ]
      };

      const confettiSymbols = ["✨", "🍀", "⭐", "💫", "🌸", "🪄", "🎉", "🌈", "💛", "🧡"];

      ritualOptions.forEach(function(option) {
        option.addEventListener("click", function() {
          ritualOptions.forEach(function(item) {
            item.classList.remove("active");
          });

          option.classList.add("active");
          selectedRitual = option.getAttribute("data-ritual");
          selectedRitualName = option.innerText.trim();
        });
      });

      function getRandomItem(array) {
        return array[Math.floor(Math.random() * array.length)];
      }

      function launchConfetti() {
        for (let i = 0; i < 70; i++) {
          const item = document.createElement("div");
          item.className = "confetti";
          item.textContent = getRandomItem(confettiSymbols);

          const angle = Math.random() * Math.PI * 2;
          const distance = Math.floor(Math.random() * 420) + 160;

          const x = Math.cos(angle) * distance;
          const y = Math.sin(angle) * distance;

          item.style.setProperty("--x", x + "px");
          item.style.setProperty("--y", y + "px");
          item.style.fontSize = Math.floor(Math.random() * 18 + 20) + "px";
          item.style.animationDelay = Math.random() * 0.12 + "s";

          document.body.appendChild(item);

          setTimeout(function() {
            item.remove();
          }, 2300);
        }
      }

      startBtn.addEventListener("click", function() {
        const wish = wishInput.value.trim();

        if (!wish) {
          resultBox.classList.remove("hidden");
          growthText.textContent = "Сначала нужно желание";
          resultText.textContent = "Удача любит конкретику. Хотя бы примерно.";
          return;
        }

        if (!selectedRitual) {
          resultBox.classList.remove("hidden");
          growthText.textContent = "Сначала выбери действие";
          resultText.textContent = "Нужно активировать хотя бы один способ призыва удачи.";
          return;
        }

        magicZone.classList.remove("active");
        void magicZone.offsetWidth;
        magicZone.classList.add("active");

        const growth = Math.floor(Math.random() * 81) + 70;
        const phrases = ritualTexts[selectedRitual];
        const text = getRandomItem(phrases);

        growthText.textContent = "Вероятность успеха выросла на " + growth + "%";
        resultText.textContent = text;
        resultBox.classList.remove("hidden");

        launchConfetti();

        const li = document.createElement("li");
        li.textContent = selectedRitualName + " — вероятность успеха +" + growth + "%";
        historyList.prepend(li);
      });
    });
  </script>
</body>
</html>
